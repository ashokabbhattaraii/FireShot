<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>FireSlot Nepal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#0B0B14;display:flex;align-items:center;justify-content:center;flex-direction:column}
.logo{font-size:3rem;margin-bottom:1.5rem}
.brand{color:#fff;font-family:-apple-system,BlinkMacSystemFont,sans-serif;font-size:1.25rem;font-weight:700;letter-spacing:.5px;margin-bottom:2rem}
.dots{display:flex;gap:8px}
.dots span{width:10px;height:10px;border-radius:50%;background:#E53935;animation:bounce .6s infinite alternate}
.dots span:nth-child(2){animation-delay:.2s}
.dots span:nth-child(3){animation-delay:.4s}
@keyframes bounce{from{transform:translateY(0)}to{transform:translateY(-12px)}}
</style>
</head>
<body>
<div class="logo">&#x1F525;</div>
<div class="brand">FireSlot Nepal</div>
<div class="dots"><span></span><span></span><span></span></div>
</body>
</html>
